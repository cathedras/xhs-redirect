<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>打开小红书</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #ff2442 0%, #ff6b7a 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px 30px;
            text-align: center;
            max-width: 360px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .logo {
            width: 80px;
            height: 80px;
            background: #ff2442;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 36px;
        }
        
        h1 {
            font-size: 22px;
            color: #333;
            margin-bottom: 10px;
        }
        
        .desc {
            color: #999;
            font-size: 14px;
            margin-bottom: 30px;
        }
        
        .btn-open {
            display: block;
            width: 100%;
            padding: 16px;
            background: #ff2442;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
        }
        
        .btn-open:active {
            transform: scale(0.96);
            opacity: 0.9;
        }
        
        .tips {
            margin-top: 20px;
            padding: 12px;
            background: #fff5f5;
            border-radius: 8px;
            font-size: 12px;
            color: #666;
            line-height: 1.6;
        }
        
        .loading {
            display: none;
        }
        
        .loading.active {
            display: block;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #ff2442;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .error {
            display: none;
            color: #ff2442;
            font-size: 14px;
            margin-top: 15px;
        }
        
        .error.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">📕</div>
        <h1>打开小红书</h1>
        <p class="desc">即将跳转到小红书小程序</p>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>正在跳转...</p>
        </div>
        
        <button class="btn-open" id="btnOpen" onclick="openXiaohongshu()">
            打开小红书
        </button>
        
        <div class="error" id="error">
            链接参数错误，请检查 URL
        </div>
        
        <div class="tips">
            💡 如果无法打开，请确保已安装小红书 APP
        </div>
    </div>

    <script>
        // 解析 URL 参数
        function getParam(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }
        
        // 小红书小程序信息
        const XHS_APPID = 'wx9ef99641f13b2e9d';
        
        // 获取 param 参数
        const paramUrl = getParam('param');
        
        // 验证参数
        if (!paramUrl) {
            document.getElementById('error').classList.add('active');
            document.getElementById('btnOpen').style.display = 'none';
        }
        
        function openXiaohongshu() {
            const loading = document.getElementById('loading');
            const btn = document.getElementById('btnOpen');
            
            loading.classList.add('active');
            btn.style.display = 'none';
            
            // 方案 1: 尝试通过 URL Scheme 打开小红书 APP
            // 小红书 URL Scheme: xhs://
            window.location.href = 'xhs://';
            
            // 方案 2: 如果 Scheme 失败，尝试跳转到原始链接
            setTimeout(() => {
                if (paramUrl) {
                    // 跳转到小红书短链
                    window.location.href = paramUrl;
                }
            }, 1500);
            
            // 方案 3: 尝试微信小程序跳转（如果在微信内）
            if (typeof wx !== 'undefined') {
                wx.miniProgram.navigateTo({
                    url: '/pages/index/index'
                });
            }
        }
        
        // 自动尝试打开（可选）
        // setTimeout(openXiaohongshu, 1000);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>打开小红书</title>
    <script src="https://res.wx.qq.com/open/js/jweixin-1.6.0.js"></script>
    <script src="https://res.wx.qq.com/open/js/cloudbase/1.1.0/cloud.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #ff2442 0%, #ff6b7a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 40px 30px;
            text-align: center;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        .logo-section {
            margin-bottom: 24px;
        }
        .main-logo {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #ff2442, #ff6b7a);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-size: 50px;
            box-shadow: 0 8px 24px rgba(255,36,66,0.3);
            overflow: hidden;
        }
        .main-logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }
        .main-logo.has-image img {
            display: block;
        }
        .main-logo.has-image .logo-fallback {
            display: none;
        }
        .brand-name {
            font-size: 24px;
            font-weight: 700;
            color: #333;
            margin-bottom: 4px;
        }
        .brand-desc {
            color: #999;
            font-size: 14px;
        }
        .qr-section {
            margin: 24px 0;
            padding: 20px;
            background: #f8f8f8;
            border-radius: 16px;
        }
        .qr-code {
            width: 200px;
            height: 200px;
            margin: 0 auto 12px;
            background: white;
            padding: 10px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .qr-code img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .qr-tip {
            font-size: 13px;
            color: #666;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #ff2442, #ff6b7a);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            margin-bottom: 12px;
            box-shadow: 0 4px 15px rgba(255, 36, 66, 0.4);
            position: relative;
            overflow: hidden;
        }
        .btn:after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: 0.5s;
        }
        .btn:hover:after {
            left: 100%;
        }
        .btn:active { transform: scale(0.96); opacity: 0.9; }
        .btn-primary {
            background: linear-gradient(135deg, #ff2442, #ff6b7a);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 4px 15px rgba(255, 36, 66, 0.4); }
            50% { box-shadow: 0 4px 25px rgba(255, 36, 66, 0.6); }
            100% { box-shadow: 0 4px 15px rgba(255, 36, 66, 0.4); }
        }
        .btn-outline {
            background: transparent;
            border: 2px solid #ff2442;
            color: #ff2442;
        }
        .tips {
            margin-top: 20px;
            padding: 12px;
            background: #fff5f5;
            border-radius: 8px;
            font-size: 12px;
            color: #888;
            line-height: 1.6;
        }
        .wechat-tips {
            display: none;
            margin-top: 16px;
            padding: 20px;
            background: #fff3cd;
            border: 2px solid #ffc107;
            border-radius: 12px;
            text-align: center;
        }
        .wechat-tips.active { display: block; }
        .wechat-tips h3 {
            color: #856404;
            font-size: 18px;
            margin-bottom: 12px;
            font-weight: 600;
        }
        .wechat-tips p {
            color: #856404;
            font-size: 14px;
            line-height: 1.8;
            margin: 8px 0;
        }
        .wechat-tips .highlight {
            background: #ff2442;
            color: white;
            padding: 12px 20px;
            border-radius: 25px;
            display: inline-block;
            margin: 10px 0;
            font-weight: 600;
            font-size: 16px;
        }
        .wx-open-launch-weapp {
            width: 100%;
            display: block;
            margin-bottom: 12px;
        }
        .wx-open-launch-weapp button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #ff2442, #ff6b7a);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 36, 66, 0.4);
        }
        .arrow {
            font-size: 24px;
            margin: 8px 0;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo-section">
            <div class="main-logo" id="mainLogo">
                <span class="logo-fallback">📕</span>
                <img id="customLogo" alt="自定义 logo">
            </div>
            <div class="brand-name">小红书</div>
            <div class="brand-desc">发现真实、向上、多元的世界</div>
        </div>
        
        <div class="qr-section">
            <div class="qr-code" id="qrCode">
                <!-- 二维码由 JS 生成 -->
            </div>
            <div class="qr-tip">长按二维码识别或截图保存</div>
        </div>
        
        <!-- 微信开放标签：在微信内直接跳转小程序 -->
        <wx-open-launch-weapp
            id="launch-btn"
            username="gh_d3c1c85e5a7a" 
            path="pages/compose/index?scene=SKB000003"
            style="display: block; width: 100%; margin-bottom: 12px;">
            <template>
                <button class="btn btn-primary" style="width: 100%; padding: 16px; background: linear-gradient(135deg, #ff2442, #ff6b7a); color: white; border: none; border-radius: 25px; font-size: 17px; font-weight: 600; cursor: pointer; box-shadow: 0 4px 15px rgba(255, 36, 66, 0.4);">
                    📱 打开小红书
                </button>
            </template>
        </wx-open-launch-weapp>
        
        <!-- 非微信环境或备用按钮 -->
        <button class="btn btn-primary" id="btnOpen" onclick="openApp()" style="display: none;">
            📱 打开小红书
        </button>
        
        <button class="btn btn-outline" onclick="copyLink()">
            复制链接
        </button>
        
        <div class="wechat-tips" id="wechatTips">
            <h3>⚠️ 微信内无法直接跳转</h3>
            <p>请点击右上角</p>
            <div class="highlight">「···」→「在浏览器打开」</div>
            <p>即可自动跳转小红书APP</p>
        </div>
        
        <div class="tips" id="normalTips">
            💡 如果无法自动打开，请确保已安装小红书 APP
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
        // 获取 URL 参数
        function getParam(name) {
            const params = new URLSearchParams(window.location.search);
            return params.get(name);
        }
        
        // 判断环境
        function isWechat() {
            return /MicroMessenger/i.test(navigator.userAgent);
        }
        
        function isIOS() {
            return /iPhone|iPad|iPod/i.test(navigator.userAgent);
        }
        
        // 目标链接（解析后的真实地址）
        const targetUrl = getParam('param') || 'https://xhslink.com/m/AZybE6hgByh';
        const CUSTOM_LOGO_STORAGE_KEY = 'xhs-custom-logo';

        function getStoredLogo() {
            try {
                return localStorage.getItem(CUSTOM_LOGO_STORAGE_KEY);
            } catch (error) {
                return null;
            }
        }

        const customLogoUrl = getParam('logo') || getStoredLogo();
        
        // 解析短链获取真实地址（用于二维码）
        let realUrl = targetUrl;

        function setupCustomLogo() {
            if (!customLogoUrl) {
                return;
            }

            const mainLogo = document.getElementById('mainLogo');
            const customLogo = document.getElementById('customLogo');

            customLogo.onload = function() {
                mainLogo.classList.add('has-image');
            };

            customLogo.onerror = function() {
                mainLogo.classList.remove('has-image');
                customLogo.removeAttribute('src');
            };

            customLogo.src = customLogoUrl;

            if (customLogo.complete && customLogo.naturalWidth > 0) {
                mainLogo.classList.add('has-image');
            }
        }
        
        // 如果是短链，先解析
        if (targetUrl.includes('xhslink.com')) {
            // 调用解析 API
            fetch('/api/resolve?url=' + encodeURIComponent(targetUrl))
                .then(res => res.json())
                .then(data => {
                    if (data.success && data.realUrl) {
                        realUrl = data.realUrl;
                        generateQR();
                    }
                })
                .catch(() => {
                    generateQR();
                });
        } else {
            generateQR();
        }
        
        // 生成二维码（使用真实地址）
        function generateQR() {
            const qrDiv = document.getElementById('qrCode');
            qrDiv.innerHTML = '';
            new QRCode(qrDiv, {
                text: realUrl,
                width: 180,
                height: 180,
                colorDark: '#000000',
                colorLight: '#ffffff',
                correctLevel: QRCode.CorrectLevel.H
            });
        }
        
        // 打开 APP - 优化微信内体验
        function openApp() {
            const btn = document.getElementById('btnOpen');
            
            if (isWechat()) {
                // 微信内：显示引导提示，并尝试用 scheme 打开
                document.getElementById('wechatTips').classList.add('active');
                document.getElementById('normalTips').style.display = 'none';
                
                // 尝试直接跳转（部分微信版本支持）
                setTimeout(() => {
                    if (isIOS()) {
                        window.location.href = 'xhsdiscover://';
                    } else {
                        window.location.href = 'intent://xiaohongshu.com#Intent;package=com.xingin.xhs;scheme=xhs;end;';
                    }
                }, 500);
                return;
            }
            
            // 显示加载提示
            btn.innerHTML = '⏳ 正在打开...';
            btn.disabled = true;
            
            // 直接尝试跳转
            if (isIOS()) {
                window.location.href = 'xhsdiscover://';
            } else {
                window.location.href = 'intent://xiaohongshu.com#Intent;package=com.xingin.xhs;scheme=xhs;end;';
            }
            
            // 2秒后如果没有跳转，尝试真实链接
            setTimeout(() => {
                window.location.href = realUrl;
            }, 2000);
        }
        
        // 复制链接
        function copyLink() {
            navigator.clipboard.writeText(realUrl).then(() => {
                alert('链接已复制到剪贴板');
            });
        }
        
        // 页面加载
        window.onload = function() {
            setupCustomLogo();

            if (isWechat()) {
                // 微信内：显示开放标签，隐藏普通按钮
                document.getElementById('btnOpen').style.display = 'none';
                document.getElementById('wechatTips').style.display = 'none';
                
                // 配置微信JS-SDK
                wx.config({
                    debug: false,
                    appId: '', // 需要填写你的公众号AppID
                    timestamp: 1234567890,
                    nonceStr: 'random-string',
                    signature: 'generated-signature',
                    jsApiList: [],
                    openTagList: ['wx-open-launch-weapp']
                });
                
                wx.ready(function() {
                    console.log('微信JS-SDK配置成功');
                });
                
                wx.error(function(res) {
                    console.log('微信JS-SDK配置失败', res);
                    // 配置失败时显示普通按钮
                    document.getElementById('btnOpen').style.display = 'block';
                    document.getElementById('wechatTips').classList.add('active');
                });
            } else {
                // 非微信环境：显示普通按钮
                document.getElementById('btnOpen').style.display = 'block';
                document.getElementById('wechatTips').style.display = 'none';
            }
        };
    </script>
</body>
</html>

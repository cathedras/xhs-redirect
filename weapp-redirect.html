<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>打开小红书</title>
    <script src="https://res.wx.qq.com/open/js/jweixin-1.6.0.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #ff2442 0%, #ff6b7a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 40px 30px;
            text-align: center;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        .logo-section {
            margin-bottom: 24px;
        }
        .main-logo {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #ff2442, #ff6b7a);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-size: 50px;
            box-shadow: 0 8px 24px rgba(255,36,66,0.3);
        }
        .brand-name {
            font-size: 24px;
            font-weight: 700;
            color: #333;
            margin-bottom: 4px;
        }
        .brand-desc {
            color: #999;
            font-size: 14px;
        }
        .qr-section {
            margin: 24px 0;
            padding: 20px;
            background: #f8f8f8;
            border-radius: 16px;
        }
        .qr-code {
            width: 200px;
            height: 200px;
            margin: 0 auto 12px;
            background: white;
            padding: 10px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .qr-code img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .qr-tip {
            font-size: 13px;
            color: #666;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #ff2442, #ff6b7a);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            margin-bottom: 12px;
        }
        .btn:active { transform: scale(0.98); opacity: 0.9; }
        .btn-outline {
            background: transparent;
            border: 2px solid #ff2442;
            color: #ff2442;
        }
        .tips {
            margin-top: 20px;
            padding: 12px;
            background: #fff5f5;
            border-radius: 8px;
            font-size: 12px;
            color: #888;
            line-height: 1.6;
        }
        .wechat-tips {
            display: none;
            margin-top: 16px;
            padding: 16px;
            background: #e8f5e9;
            border-radius: 12px;
            text-align: left;
        }
        .wechat-tips.active { display: block; }
        .wechat-tips h3 {
            color: #2e7d32;
            font-size: 16px;
            margin-bottom: 8px;
        }
        .wechat-tips p {
            color: #555;
            font-size: 14px;
            line-height: 1.6;
        }
        .arrow {
            font-size: 24px;
            margin: 8px 0;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo-section">
            <div class="main-logo">📕</div>
            <div class="brand-name">小红书</div>
            <div class="brand-desc">发现真实、向上、多元的世界</div>
        </div>
        
        <div class="qr-section">
            <div class="qr-code" id="qrCode">
                <!-- 二维码由 JS 生成 -->
            </div>
            <div class="qr-tip">长按二维码识别或截图保存</div>
        </div>
        
        <button class="btn" id="btnOpen" onclick="openApp()">
            打开小红书 APP
        </button>
        
        <button class="btn btn-outline" onclick="copyLink()">
            复制链接
        </button>
        
        <div class="wechat-tips" id="wechatTips">
            <h3>💡 在微信中打开</h3>
            <p>1. 点击右上角「···」</p>
            <div class="arrow">↓</div>
            <p>2. 选择「在浏览器打开」</p>
            <div class="arrow">↓</div>
            <p>3. 即可自动跳转小红书</p>
        </div>
        
        <div class="tips" id="normalTips">
            💡 如果无法自动打开，请确保已安装小红书 APP
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
        // 获取 URL 参数
        function getParam(name) {
            const params = new URLSearchParams(window.location.search);
            return params.get(name);
        }
        
        // 判断环境
        function isWechat() {
            return /MicroMessenger/i.test(navigator.userAgent);
        }
        
        function isIOS() {
            return /iPhone|iPad|iPod/i.test(navigator.userAgent);
        }
        
        // 目标链接
        const targetUrl = getParam('param') || 'https://xhslink.com/m/AZybE6hgByh';
        const redirectUrl = 'https://xhs-redirect.vercel.app/redirect?param=' + encodeURIComponent(targetUrl);
        
        // 生成二维码
        function generateQR() {
            const qrDiv = document.getElementById('qrCode');
            new QRCode(qrDiv, {
                text: redirectUrl,
                width: 180,
                height: 180,
                colorDark: '#000000',
                colorLight: '#ffffff',
                correctLevel: QRCode.CorrectLevel.H
            });
        }
        
        // 打开 APP
        function openApp() {
            if (isWechat()) {
                // 微信内提示用浏览器打开
                document.getElementById('wechatTips').classList.add('active');
                document.getElementById('normalTips').style.display = 'none';
                return;
            }
            
            // 尝试打开小红书 APP
            if (isIOS()) {
                window.location.href = 'xhs://';
            } else {
                window.location.href = 'intent://xiaohongshu.com#Intent;package=com.xingin.xhs;scheme=xhs;end;';
            }
            
            // 延迟后跳转
            setTimeout(() => {
                window.location.href = targetUrl;
            }, 2000);
        }
        
        // 复制链接
        function copyLink() {
            navigator.clipboard.writeText(redirectUrl).then(() => {
                alert('链接已复制到剪贴板');
            });
        }
        
        // 页面加载
        window.onload = function() {
            generateQR();
            
            if (isWechat()) {
                document.getElementById('wechatTips').classList.add('active');
                document.getElementById('normalTips').style.display = 'none';
            }
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>上传 Logo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: linear-gradient(135deg, #ff2442 0%, #ff6b7a 100%);
            --card: #ffffff;
            --text: #1f2937;
            --muted: #6b7280;
            --line: #eceef2;
            --brand: #ff2442;
            --brand-2: #ff6b7a;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            padding: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
        }
        .shell {
            width: 100%;
            max-width: 720px;
            display: grid;
            grid-template-columns: 1.1fr 0.9fr;
            gap: 20px;
        }
        .panel {
            background: rgba(255,255,255,0.98);
            border-radius: 24px;
            box-shadow: 0 24px 80px rgba(0,0,0,0.18);
            overflow: hidden;
        }
        .hero {
            padding: 34px;
            background: radial-gradient(circle at top left, rgba(255,255,255,0.22), transparent 38%), linear-gradient(135deg, #ff2442 0%, #ff6b7a 100%);
            color: white;
        }
        .hero h1 {
            font-size: 34px;
            line-height: 1.1;
            margin-bottom: 12px;
        }
        .hero p {
            color: rgba(255,255,255,0.9);
            font-size: 15px;
            line-height: 1.7;
            max-width: 28rem;
        }
        .content {
            padding: 28px 34px 34px;
        }
        .field {
            margin-bottom: 18px;
        }
        .field label {
            display: block;
            margin-bottom: 8px;
            color: var(--text);
            font-size: 14px;
            font-weight: 700;
        }
        .field input[type="text"],
        .field input[type="url"] {
            width: 100%;
            border: 1px solid var(--line);
            background: #fafafa;
            border-radius: 14px;
            padding: 13px 14px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .field input:focus {
            border-color: rgba(255,36,66,0.45);
            box-shadow: 0 0 0 4px rgba(255,36,66,0.08);
            background: white;
        }
        .upload-box {
            border: 1.5px dashed #d7dbe3;
            border-radius: 18px;
            padding: 18px;
            background: #fbfcfe;
        }
        .file-input {
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
        }
        .upload-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 14px 16px;
            border-radius: 14px;
            background: white;
            border: 1px solid var(--line);
            color: var(--text);
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
        }
        .upload-btn:hover {
            border-color: rgba(255,36,66,0.35);
            transform: translateY(-1px);
        }
        .preview {
            margin-top: 16px;
            display: none;
        }
        .preview.active {
            display: block;
        }
        .preview-card {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px;
            border-radius: 16px;
            background: white;
            border: 1px solid var(--line);
        }
        .preview-card img {
            width: 76px;
            height: 76px;
            border-radius: 18px;
            object-fit: cover;
            background: #f3f4f6;
            box-shadow: 0 10px 24px rgba(0,0,0,0.08);
        }
        .preview-meta h2 {
            font-size: 16px;
            color: var(--text);
            margin-bottom: 4px;
        }
        .preview-meta p {
            font-size: 13px;
            color: var(--muted);
            line-height: 1.5;
            word-break: break-all;
        }
        .actions {
            display: grid;
            gap: 10px;
            margin-top: 18px;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            min-height: 48px;
            border: none;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            transition: transform 0.2s, opacity 0.2s, box-shadow 0.2s;
        }
        .btn:active {
            transform: scale(0.98);
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--brand), var(--brand-2));
            color: white;
            box-shadow: 0 12px 24px rgba(255,36,66,0.22);
        }
        .btn-secondary {
            background: #f3f4f6;
            color: var(--text);
        }
        .btn-ghost {
            background: transparent;
            color: #7a7f8a;
            border: 1px solid var(--line);
        }
        .status {
            margin-top: 16px;
            font-size: 13px;
            color: var(--muted);
            line-height: 1.7;
            padding: 12px 14px;
            border-radius: 14px;
            background: #fafafa;
            border: 1px solid var(--line);
        }
        .tip-panel {
            padding: 34px;
            background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02));
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            gap: 20px;
        }
        .tip-card {
            border-radius: 20px;
            padding: 20px;
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.16);
            backdrop-filter: blur(16px);
        }
        .tip-card h3 {
            font-size: 18px;
            margin-bottom: 10px;
        }
        .tip-card p {
            font-size: 14px;
            line-height: 1.8;
            color: rgba(255,255,255,0.9);
        }
        .small-links {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .small-links a {
            color: white;
            text-decoration: none;
            font-weight: 700;
            padding: 10px 14px;
            border-radius: 999px;
            border: 1px solid rgba(255,255,255,0.24);
            background: rgba(255,255,255,0.08);
        }
        @media (max-width: 860px) {
            body { padding: 16px; }
            .shell { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="shell">
        <section class="panel">
            <div class="hero">
                <h1>上传你的 Logo</h1>
                <p>上传后会自动保存到本站浏览器里，打开小红书跳转页时会优先加载这个 Logo。你也可以直接输入图片地址，页面会按同样方式读取。</p>
            </div>
            <div class="content">
                <div class="field">
                    <label for="logoFile">本地上传</label>
                    <div class="upload-box">
                        <input class="file-input" id="logoFile" type="file" accept="image/*">
                        <label class="upload-btn" for="logoFile">📁 选择 Logo 图片</label>
                        <div class="preview" id="previewWrap">
                            <div class="preview-card">
                                <img id="previewImg" alt="Logo 预览">
                                <div class="preview-meta">
                                    <h2>当前预览</h2>
                                    <p id="previewText">尚未选择图片</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="field">
                    <label for="logoUrl">图片地址（可选）</label>
                    <input type="url" id="logoUrl" placeholder="https://example.com/logo.png">
                </div>

                <div class="actions">
                    <button class="btn btn-primary" id="btnSave" type="button">保存到本站</button>
                    <a class="btn btn-secondary" href="/weapp" target="_blank" rel="noreferrer">打开跳转页</a>
                    <button class="btn btn-ghost" id="btnClear" type="button">清除本站 Logo</button>
                </div>

                <div class="status" id="statusBox">
                    还没有保存 Logo。上传一张图片后点击“保存到本站”，跳转页会自动读取。
                </div>
            </div>
        </section>

        <aside class="panel tip-panel">
            <div class="tip-card">
                <h3>使用方式</h3>
                <p>1. 选择一张 Logo 图片。<br>2. 点击保存。<br>3. 打开 /weapp 页面，顶部会自动显示你的 Logo。</p>
            </div>
            <div class="tip-card">
                <h3>说明</h3>
                <p>这个方案会把 Logo 存在当前浏览器的本站存储里，适合同一个站点反复使用。若你想让所有人都通过同一个公开链接看到 Logo，我可以再给你加后端上传存储。</p>
            </div>
            <div class="small-links">
                <a href="/weapp">跳转页</a>
                <a href="/qr">二维码页</a>
            </div>
        </aside>
    </div>

    <script>
        const STORAGE_KEY = 'xhs-custom-logo';

        const logoFile = document.getElementById('logoFile');
        const logoUrl = document.getElementById('logoUrl');
        const previewWrap = document.getElementById('previewWrap');
        const previewImg = document.getElementById('previewImg');
        const previewText = document.getElementById('previewText');
        const statusBox = document.getElementById('statusBox');
        const btnSave = document.getElementById('btnSave');
        const btnClear = document.getElementById('btnClear');

        let currentLogo = '';

        function setStatus(message) {
            statusBox.textContent = message;
        }

        function showPreview(source, description) {
            currentLogo = source;
            previewImg.src = source;
            previewWrap.classList.add('active');
            previewText.textContent = description;
        }

        function clearPreview() {
            currentLogo = '';
            logoFile.value = '';
            logoUrl.value = '';
            previewImg.removeAttribute('src');
            previewWrap.classList.remove('active');
            previewText.textContent = '尚未选择图片';
        }

        logoFile.addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (!file) {
                return;
            }

            const reader = new FileReader();
            reader.onload = function(loadEvent) {
                showPreview(loadEvent.target.result, file.name + ' · ' + Math.round(file.size / 1024) + ' KB');
                setStatus('图片已加载，点击“保存到本站”即可让跳转页使用它。');
            };
            reader.readAsDataURL(file);
        });

        logoUrl.addEventListener('input', function(event) {
            const value = event.target.value.trim();
            if (!value) {
                return;
            }
            showPreview(value, '图片地址已填写，保存后跳转页会优先读取这个地址。');
        });

        btnSave.addEventListener('click', function() {
            const urlValue = logoUrl.value.trim();
            const storedValue = currentLogo || urlValue;

            if (!storedValue) {
                setStatus('请先上传图片或填写图片地址。');
                return;
            }

            try {
                localStorage.setItem(STORAGE_KEY, storedValue);
                setStatus('Logo 已保存到本站。现在打开 /weapp 就会自动加载它。');
            } catch (error) {
                setStatus('保存失败，浏览器可能禁止了本站存储。你可以先直接用图片地址方式。');
            }
        });

        btnClear.addEventListener('click', function() {
            try {
                localStorage.removeItem(STORAGE_KEY);
            } catch (error) {
                // ignore
            }
            clearPreview();
            setStatus('本站 Logo 已清除。');
        });

        (function restoreSavedLogo() {
            try {
                const savedLogo = localStorage.getItem(STORAGE_KEY);
                if (savedLogo) {
                    showPreview(savedLogo, '已从本站加载保存过的 Logo。');
                    setStatus('检测到已保存的 Logo，打开 /weapp 会直接显示它。');
                }
            } catch (error) {
                setStatus('当前浏览器不允许读取本站存储。可以改用图片地址方式。');
            }
        })();
    </script>
</body>
</html>
